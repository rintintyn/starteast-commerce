name: API Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  api-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Start API server
        run: npm start &

      - name: Wait for API healthcheck
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:3000/healthcheck; then
              echo "API is up"
              exit 0
            fi
            echo "Waiting for API..."
            sleep 2
          done
          echo "API failed to start"
          exit 1

      - name: Run test suite
        run: npm test
